<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MozCommunity v5.0</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-storage-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; color: #333; }
        .login-container { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, #185FA5 0%, #0C447C 100%); }
        .login-box { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); width: 100%; max-width: 400px; }
        .login-box h1 { text-align: center; color: #185FA5; margin-bottom: 30px; font-size: 24px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 500; font-size: 14px; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        .form-group input:focus { outline: none; border-color: #185FA5; box-shadow: 0 0 0 3px rgba(24, 95, 165, 0.1); }
        .btn { width: 100%; padding: 12px; background: #185FA5; color: white; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        .btn:hover { background: #0C447C; }
        .error { background: #f8d7da; color: #721c24; padding: 10px; border-radius: 6px; margin-bottom: 15px; display: none; }
        .error.show { display: block; }
        .success { background: #d4edda; color: #155724; padding: 10px; border-radius: 6px; margin-bottom: 15px; display: none; }
        .success.show { display: block; }
        .app-container { display: none; flex-direction: column; height: 100vh; background: white; }
        .header { background: linear-gradient(135deg, #185FA5 0%, #0C447C 100%); color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 20px; }
        .btn-logout { background: #dc3545; padding: 8px 16px; color: white; border: none; border-radius: 6px; cursor: pointer; }
        .main-content { flex: 1; padding: 20px; overflow-y: auto; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #ddd; }
        .tab-btn { padding: 10px 20px; background: none; border: none; cursor: pointer; font-weight: 500; color: #999; border-bottom: 3px solid transparent; }
        .tab-btn.active { color: #185FA5; border-bottom-color: #185FA5; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .record-card { background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #ddd; }
        .record-card h3 { color: #185FA5; margin-bottom: 5px; }
        .empty-state { text-align: center; color: #999; padding: 40px; }
    </style>
</head>
<body>
    <!-- TELA LOGIN -->
    <div id="loginScreen" class="login-container">
        <div class="login-box">
            <h1>MozCommunity v5.0</h1>
            <div id="error" class="error"></div>
            <div id="success" class="success"></div>
            
            <!-- LOGIN FORM -->
            <div id="loginForm" style="display: block;">
                <h2 style="text-align: center; font-size: 16px; color: #666; margin-bottom: 20px;">Fazer Login</h2>
                <form id="formLogin">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="loginEmail" required placeholder="seu@email.com">
                    </div>
                    <div class="form-group">
                        <label>Palavra-passe</label>
                        <input type="password" id="loginPassword" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn">Entrar</button>
                </form>
                <button type="button" class="btn" style="background: #20B2AA; margin-top: 10px;" onclick="showRegister()">Criar Conta</button>
            </div>

            <!-- REGISTER FORM -->
            <div id="registerForm" style="display: none;">
                <h2 style="text-align: center; font-size: 16px; color: #666; margin-bottom: 20px;">Criar Conta</h2>
                <form id="formRegister">
                    <div class="form-group">
                        <label>Nome Completo</label>
                        <input type="text" id="regName" required placeholder="Seu nome">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="regEmail" required placeholder="seu@email.com">
                    </div>
                    <div class="form-group">
                        <label>Palavra-passe</label>
                        <input type="password" id="regPassword" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn">Criar Conta</button>
                </form>
                <button type="button" class="btn" style="background: #6c757d; margin-top: 10px;" onclick="showLogin()">Voltar</button>
            </div>
        </div>
    </div>

    <!-- APP SCREEN -->
    <div id="appScreen" class="app-container">
        <div class="header">
            <h1>MozCommunity v5.0</h1>
            <button class="btn-logout" onclick="logout()">Sair</button>
        </div>

        <div class="main-content">
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('novo')">➕ Novo Registo</button>
                <button class="tab-btn" onclick="switchTab('lista')">📋 Meus Registos</button>
            </div>

            <!-- TAB: NOVO REGISTO -->
            <div id="tab-novo" class="tab-content active">
                <h2>Novo Registo</h2>
                <form id="formRegisto" style="margin-top: 20px;">
                    <div class="form-group">
                        <label>Nome *</label>
                        <input type="text" id="nome" required placeholder="Nome da infraestrutura">
                    </div>
                    <div class="form-group">
                        <label>Tipo *</label>
                        <select id="tipo" required>
                            <option value="">Selecione...</option>
                            <option value="estrada">Estrada</option>
                            <option value="escola">Escola</option>
                            <option value="saude">Centro Saúde</option>
                            <option value="agua">Água</option>
                            <option value="outro">Outro</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Status *</label>
                        <select id="status" required>
                            <option value="planejado">Planeado</option>
                            <option value="construcao">Em Construção</option>
                            <option value="concluido">Concluído</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Progresso (%) *</label>
                        <input type="number" id="progress" min="0" max="100" required value="0">
                    </div>
                    <button type="submit" class="btn">Guardar Registo</button>
                </form>
            </div>

            <!-- TAB: MEUS REGISTOS -->
            <div id="tab-lista" class="tab-content">
                <h2>Meus Registos</h2>
                <div id="recordsList" style="margin-top: 20px;"></div>
            </div>
        </div>
    </div>

    <script>
        // FIREBASE CONFIG - CREDENCIAIS REAIS
        const firebaseConfig = {
            apiKey: "AIzaSyDqUPcchO02QsCdawYAhn5rSB_JjrMZV94",
            authDomain: "infra-mozcommunity.firebaseapp.com",
            projectId: "infra-mozcommunity",
            storageBucket: "infra-mozcommunity.firebasestorage.app",
            messagingSenderId: "296393259981",
            appId: "1:296393259981:web:d6cd641869cea1648662284"
        };

        // INICIALIZAR FIREBASE
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;

        // LISTENERS
        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                showApp();
                loadRecords();
            } else {
                showLogin();
            }
        });

        // LOGIN
        document.getElementById('formLogin').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            try {
                await auth.signInWithEmailAndPassword(email, password);
                showSuccess('Login realizado!');
            } catch (error) {
                showError('Erro: ' + error.message);
            }
        });

        // REGISTER
        document.getElementById('formRegister').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            try {
                const result = await auth.createUserWithEmailAndPassword(email, password);
                await result.user.updateProfile({ displayName: name });
                showSuccess('Conta criada com sucesso!');
            } catch (error) {
                showError('Erro: ' + error.message);
            }
        });

        // NOVO REGISTO
        document.getElementById('formRegisto').addEventListener('submit', async (e) => {
            e.preventDefault();
            const record = {
                nome: document.getElementById('nome').value,
                tipo: document.getElementById('tipo').value,
                status: document.getElementById('status').value,
                progress: parseInt(document.getElementById('progress').value),
                criado: new Date(),
                usuario: currentUser.uid
            };
            try {
                await db.collection('users').doc(currentUser.uid)
                    .collection('infraestruturas').add(record);
                showSuccess('Registo guardado!');
                document.getElementById('formRegisto').reset();
                switchTab('lista');
            } catch (error) {
                showError('Erro: ' + error.message);
            }
        });

        // CARREGAR REGISTOS
        async function loadRecords() {
            try {
                const snapshot = await db.collection('users').doc(currentUser.uid)
                    .collection('infraestruturas').orderBy('criado', 'desc').get();
                const list = document.getElementById('recordsList');
                list.innerHTML = '';
                if (snapshot.empty) {
                    list.innerHTML = '<div class="empty-state">Nenhum registo</div>';
                    return;
                }
                snapshot.forEach(doc => {
                    const data = doc.data();
                    const div = document.createElement('div');
                    div.className = 'record-card';
                    div.innerHTML = `
                        <h3>${data.nome}</h3>
                        <p><strong>Tipo:</strong> ${data.tipo}</p>
                        <p><strong>Status:</strong> ${data.status}</p>
                        <p><strong>Progresso:</strong> ${data.progress}%</p>
                    `;
                    list.appendChild(div);
                });
            } catch (error) {
                showError('Erro ao carregar: ' + error.message);
            }
        }

        // UI FUNCTIONS
        function showApp() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('appScreen').style.display = 'flex';
        }

        function showLogin() {
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('appScreen').style.display = 'none';
        }

        function showRegister() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
        }

        function showLoginForm() {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('registerForm').style.display = 'none';
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            event.target.classList.add('active');
            if (tab === 'lista') loadRecords();
        }

        function logout() {
            auth.signOut();
        }

        function showError(msg) {
            const el = document.getElementById('error');
            el.textContent = msg;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 5000);
        }

        function showSuccess(msg) {
            const el = document.getElementById('success');
            el.textContent = msg;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 3000);
        }

        // PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }
    </script>
</body>
</html>
