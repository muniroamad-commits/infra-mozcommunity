<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Monitoria de Infraestruturas Públicas e Comunitárias</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-storage-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; }
        
        /* LOGIN */
        .login-container { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, #9D212B 0%, #7A1A21 100%); }
        .login-box { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); width: 100%; max-width: 400px; }
        .login-box h1 { text-align: center; color: #9D212B; margin-bottom: 30px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 500; font-size: 13px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; font-family: inherit; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: #9D212B; box-shadow: 0 0 0 3px rgba(24, 95, 165, 0.1); }
        .btn { width: 100%; padding: 12px; background: #9D212B; color: white; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        .btn:hover { background: #7A1A21; }
        .btn-danger { background: #dc3545; }
        .btn-danger:hover { background: #c82333; }
        .btn-secondary { background: #6c757d; }
        .btn-secondary:hover { background: #5a6268; }
        .btn-success { background: #28a745; }
        .btn-success:hover { background: #218838; }
        .error { background: #f8d7da; color: #721c24; padding: 10px; border-radius: 6px; margin-bottom: 15px; display: none; font-size: 13px; }
        .error.show { display: block; }
        .success { background: #d4edda; color: #155724; padding: 10px; border-radius: 6px; margin-bottom: 15px; display: none; font-size: 13px; }
        .success.show { display: block; }
        
        /* APP */
        .app-container { display: none; flex-direction: column; height: 100vh; background: white; }
        .app-container.show { display: flex; }
        .header { background: linear-gradient(135deg, #9D212B 0%, #7A1A21 100%); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 16px; }
        .header-info { font-size: 11px; }
        .btn-logout { background: #dc3545; padding: 8px 12px; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; }
        .main-content { flex: 1; padding: 15px; overflow-y: auto; }
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; border-bottom: 2px solid #ddd; flex-wrap: wrap; }
        .tab-btn { padding: 8px 12px; background: none; border: none; cursor: pointer; font-weight: 500; color: #999; border-bottom: 3px solid transparent; font-size: 11px; }
        .tab-btn.active { color: #9D212B; border-bottom-color: #9D212B; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .record-card { background: #f9f9f9; padding: 12px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #ddd; cursor: pointer; }
        .record-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .record-card h3 { color: #9D212B; margin-bottom: 5px; font-size: 13px; }
        .record-card p { font-size: 11px; color: #666; margin: 2px 0; }
        .empty-state { text-align: center; color: #999; padding: 40px; font-size: 13px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
        .modal.show { display: flex; }
        .modal-content { background: white; border-radius: 8px; padding: 20px; max-width: 500px; width: 90%; max-height: 85vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #ddd; padding-bottom: 10px; }
        .modal-header h2 { font-size: 15px; }
        .close-btn { background: none; border: none; font-size: 24px; cursor: pointer; color: #999; }
        .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap: 8px; margin: 8px 0; }
        .photo-item { position: relative; aspect-ratio: 1; border-radius: 6px; overflow: hidden; background: #f0f0f0; }
        .photo-item img { width: 100%; height: 100%; object-fit: cover; }
        .photo-item-remove { position: absolute; top: 0; right: 0; background: #dc3545; color: white; border: none; width: 20px; height: 20px; cursor: pointer; font-size: 10px; }
        .visit-timeline { border-left: 3px solid #9D212B; padding-left: 12px; }
        .visit-item { margin-bottom: 15px; padding: 8px; background: #f9f9f9; border-radius: 6px; }
        .visit-item-date { font-size: 11px; color: #999; margin-bottom: 3px; }
        .visit-item-status { font-size: 11px; margin-bottom: 3px; }
        .badge { display: inline-block; padding: 2px 6px; border-radius: 10px; font-size: 10px; font-weight: 600; }
        .badge-planejado { background: #e9ecef; color: #495057; }
        .badge-construcao { background: #fff3cd; color: #856404; }
        .badge-concluido { background: #d4edda; color: #155724; }
        .badge-publica { background: #e2e3ff; color: #3f3fb0; }
        .badge-comunitaria { background: #ffe8d1; color: #a3590a; }
        textarea { resize: vertical; }
        @media (max-width: 600px) {
            .header { padding: 10px; }
            .header h1 { font-size: 14px; }
            .tabs { font-size: 10px; }
            .tab-btn { padding: 6px 10px; }
            .form-group label { font-size: 12px; }
        }
    </style>
</head>

    <script>
        // FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyDqUPcchOO2QsCdawYAhn5rSB_JjrMZV94",
            authDomain: "infra-mozcommunity.firebaseapp.com",
            projectId: "infra-mozcommunity",

            messagingSenderId: "296393259981",

        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const storage = firebase.storage();

        // ===== OFFLINE: ATIVAR PERSISTÊNCIA DO FIRESTORE =====
        db.enablePersistence({ synchronizeTabs: true }).catch((err) => {
            console.warn('Persistência offline indisponível:', err.code);
        });

        let currentUser = null;
        let isAdmin = false;
        let selectedRecordId = null;
        let selectedRecordData = null;
        let newPhotos = [];
        let monitoriaPhotos = [];
        let isOnline = navigator.onLine;

        // ===== OFFLINE: FILA DE FOTOS PENDENTES (localStorage) =====
        const PENDING_KEY = 'mozcommunity_pending_photos';

        function getPendingPhotos() {
            try { return JSON.parse(localStorage.getItem(PENDING_KEY) || '[]'); }
            catch { return []; }
        }

        function savePendingPhotos(list) {
            localStorage.setItem(PENDING_KEY, JSON.stringify(list));
            updatePendingBadge();
        }

        function queuePhoto(userId, recordId, visitIndex, photo) {
            const pending = getPendingPhotos();
            pending.push({
                id: Date.now() + '_' + Math.random().toString(36).slice(2),
                userId, recordId, visitIndex,
                name: photo.name,
                data: photo.data,
                criado: new Date().toISOString()
            });
            savePendingPhotos(pending);
        }

        async function syncPendingPhotos() {
            const pending = getPendingPhotos();
            if (pending.length === 0) return;
            showSuccess(`🔄 A sincronizar ${pending.length} foto(s) pendente(s)...`);

            const stillPending = [];
            for (const item of pending) {
                try {
                    const storageRef = storage.ref(`fotos/${item.userId}/${item.recordId}/${Date.now()}_${item.name}`);
                    await storageRef.putString(item.data, 'data_url');
                    const url = await storageRef.getDownloadURL();
                    const fotoObj = { url, data: new Date().toLocaleDateString('pt-PT') };

                    const docRef = db.collection('users').doc(item.userId)
                        .collection('infraestruturas').doc(item.recordId);

                    if (item.visitIndex === null) {
                        await docRef.update({ fotos: firebase.firestore.FieldValue.arrayUnion(fotoObj) });
                    } else {
                        // item.visitIndex aqui é na verdade o visitId único da visita
                        const snap = await docRef.get();
                        const data = snap.data();
                        if (data && data.visitas) {
                            const visita = data.visitas.find(v => v.visitId === item.visitIndex);
                            if (visita) {
                                visita.fotos = visita.fotos || [];
                                visita.fotos.push(fotoObj);
                                await docRef.update({ visitas: data.visitas });
                            }
                        }
                    }
                } catch (error) {
                    console.warn('Falha ao sincronizar foto:', error.message);
                    stillPending.push(item);
                }
            }

            savePendingPhotos(stillPending);
            if (stillPending.length === 0) {
                showSuccess('✅ Todas as fotos foram sincronizadas!');
            } else {
                showError(`⚠️ ${stillPending.length} foto(s) continuam pendentes (sem rede).`);
            }
            if (document.getElementById('tab-lista') && document.getElementById('tab-lista').classList.contains('active')) loadRecords();
        }

            if (!latVal || !lonVal) {
                showError('📍 Precisa de captar o GPS antes de guardar. Toque no botão "Captar Coordenadas GPS".');
                return;
            }

            const nomeInfra = document.getElementById('nome').value;

                nome: nomeInfra,
                tipo: document.getElementById('tipo').value,
                categoria: document.getElementById('categoria').value,

                longitude: parseFloat(lonVal),

                progress: parseInt(document.getElementById('progress').value),
                criado: new Date(),
                usuario: currentUser.uid,
                fotos: [],
                visitas: []
            };

            try {
                showSuccess(navigator.onLine ? 'Guardando...' : '📴 Sem rede — a guardar localmente, sincroniza automaticamente!');

                // IMPORTANTE: gerar o ID do documento localmente (doc() sem argumentos) em vez de usar add().
                // Isto funciona sempre, mesmo sem internet — add() ficaria "pendurado" à espera do
                // servidor antes de dar o ID, o que trava a app quando está offline.
                const docRef = db.collection('users').doc(currentUser.uid)
                    .collection('infraestruturas').doc();

                if (navigator.onLine) {
                    await docRef.set(record); // online: espera confirmação real
                } else {
                    docRef.set(record); // offline: não bloqueia — o Firestore sincroniza sozinho depois
                }

                // Fotos: tenta enviar já; se falhar (offline), entra na fila local
                let falhadas = 0;

                    } catch (photoErr) {
                        queuePhoto(currentUser.uid, docRef.id, null, photo);
                        falhadas++;
                    }

            const novoStatus = document.getElementById('monitoriaStatus').value;
            const novoProgress = parseInt(document.getElementById('monitoriaProgress').value) || 0;
            const orcamentoVal = document.getElementById('monitoriaOrcamento').value;

            const visit = {
                visitId,
                tipo: 'monitoria', // marca este registo do histórico como vindo da Monitoria rápida

                status: novoStatus,
                progress: novoProgress,
                orcamentoGasto: orcamentoVal ? parseFloat(orcamentoVal) : null,
                observacoes: document.getElementById('monitoriaObservacoes').value,
                fotos: []
            };

            try {
                let falhadas = 0;
                for (let photo of monitoriaPhotos) {
                    try {
                        const storageRef = storage.ref(`fotos/${currentUser.uid}/${selectedRecordId}/${Date.now()}_${photo.name}`);
                        await storageRef.putString(photo.data, 'data_url');

                    } catch (photoErr) {
                        queuePhoto(currentUser.uid, selectedRecordId, visitId, photo);
                        falhadas++;
                    }
                }

                const escritaFirestore = db.collection('users').doc(currentUser.uid)
                    .collection('infraestruturas').doc(selectedRecordId)
                    .update({
                        visitas: firebase.firestore.FieldValue.arrayUnion(visit),
                        status: novoStatus,
                        progress: novoProgress
                    });

                // IMPORTANTE: só esperamos a confirmação do servidor quando há rede.
                // Offline, o Firestore já guardou a alteração localmente e sincroniza
                // sozinho mais tarde — esperar (`await`) aqui deixaria a app "pendurada"
                // indefinidamente sem rede, parecendo que a Monitoria não foi guardada.
                if (navigator.onLine) {
                    await escritaFirestore;
                } else {
                    escritaFirestore.catch(err => console.warn('Sincronização de monitoria pendente:', err.message));
                }

                showSuccess(falhadas > 0 ? `✅ Monitoria guardada! 📸 ${falhadas} foto(s) na fila (sem rede).` : '✅ Monitoria guardada!');
                closeModal('monitoriaModal');

                monitoriaPhotos = [];
                document.getElementById('monitoriaPhotoPreview').innerHTML = '';
                loadRecords();
            } catch (error) {
                showError('Erro: ' + error.message);

        // ===== SUPERVISOR: SINCRONIZAÇÃO EM TEMPO REAL =====
        // Em vez de "buscar uma vez", usamos onSnapshot: o Firestore avisa-nos
        // automaticamente sempre que um técnico cria/edita um registo ou visita,
        // sem precisar de recarregar a página.
        let adminUnsubscribes = [];
        let adminDataMap = {}; // { userId: { name, records: [...] } }

        async function loadAdminData() {
            if (!isAdmin) return;

            // Limpar listeners antigos antes de criar novos (evita duplicações)
            adminUnsubscribes.forEach(unsub => unsub());
            adminUnsubscribes = [];
            adminDataMap = {};

            try {
                const usersSnapshot = await db.collection('users').get();

                usersSnapshot.forEach(userDoc => {
                    const userId = userDoc.id;
                    const userName = userDoc.data().name || 'Técnico';

                    // Listener em tempo real por cada técnico
                    const unsub = db.collection('users').doc(userId)
                        .collection('infraestruturas').orderBy('criado', 'desc')
                        .onSnapshot(snapshot => {
                            adminDataMap[userId] = {
                                name: userName,
                                records: snapshot.docs.map(d => ({ id: d.id, data: d.data() }))
                            };
                            renderAdminList();
                        }, error => {
                            console.warn('Listener supervisor falhou para', userName, error.message);
                        });

                    adminUnsubscribes.push(unsub);
                });
            } catch (error) {
                showError('Erro: ' + error.message);
            }
        }

        function renderAdminList() {
            const list = document.getElementById('adminList');
            const statsBox = document.getElementById('adminStats');
            if (!list) return;

            const filtroProvincia = document.getElementById('filterProvincia')?.value || '';
            const filtroStatus = document.getElementById('filterStatus')?.value || '';
            const filtroCategoria = document.getElementById('filterCategoria')?.value || '';

            // Juntar todos os registos de todos os técnicos numa lista só
            let todos = [];
            Object.values(adminDataMap).forEach(user => {
                user.records.forEach(r => todos.push({ ...r, tecnico: user.name }));
            });

            // Ordenar pelo mais recente
            todos.sort((a, b) => {
                const da = a.data.criado?.toDate ? a.data.criado.toDate() : new Date(a.data.criado);
                const db_ = b.data.criado?.toDate ? b.data.criado.toDate() : new Date(b.data.criado);
                return db_ - da;
            });

            // Estatísticas rápidas (sobre o total, antes de filtrar)
            const totalConstrucao = todos.filter(r => r.data.status === 'construcao').length;
            const totalConcluido = todos.filter(r => r.data.status === 'concluido').length;
            const totalPublica = todos.filter(r => r.data.categoria === 'publica').length;
            const totalComunitaria = todos.filter(r => r.data.categoria === 'comunitaria').length;
            const totalVisitas = todos.reduce((sum, r) => sum + (r.data.visitas ? r.data.visitas.length : 0), 0);

            if (statsBox) {
                statsBox.innerHTML = `
                    <div style="background:#e9ecef; padding:6px 10px; border-radius:6px; font-size:11px;"><strong>${todos.length}</strong> registos</div>
                    <div style="background:#fff3cd; padding:6px 10px; border-radius:6px; font-size:11px;"><strong>${totalConstrucao}</strong> em construção</div>
                    <div style="background:#d4edda; padding:6px 10px; border-radius:6px; font-size:11px;"><strong>${totalConcluido}</strong> concluídos</div>
                    <div style="background:#e2e3ff; padding:6px 10px; border-radius:6px; font-size:11px;"><strong>${totalPublica}</strong> públicas</div>
                    <div style="background:#ffe8d1; padding:6px 10px; border-radius:6px; font-size:11px;"><strong>${totalComunitaria}</strong> comunitárias</div>
                    <div style="background:#e2e3ff; padding:6px 10px; border-radius:6px; font-size:11px;"><strong>${totalVisitas}</strong> visitas/monitorias</div>
                `;
            }

            // Aplicar filtros
            let filtrados = todos;
            if (filtroProvincia) filtrados = filtrados.filter(r => r.data.provincia === filtroProvincia);
            if (filtroStatus) filtrados = filtrados.filter(r => r.data.status === filtroStatus);
            if (filtroCategoria) filtrados = filtrados.filter(r => r.data.categoria === filtroCategoria);

            list.innerHTML = '';
            if (filtrados.length === 0) {
                list.innerHTML = '<div class="empty-state">Nenhum registo encontrado.</div>';
                return;
            }

            filtrados.forEach(r => {
                const data = r.data;
                const div = document.createElement('div');
                div.className = 'record-card';
                div.onclick = () => showDetail(r.id, data);
                const numVisitas = data.visitas ? data.visitas.length : 0;
                div.innerHTML = `
                    <h3>${data.nome}</h3>
                    <p><strong>Técnico:</strong> ${r.tecnico}</p>
                    <p><i class="fas fa-map-marker"></i> ${data.provincia || ''} • ${data.distrito || ''}, ${data.aldeia || ''}</p>
                    <p>${categoriaBadge(data.categoria)} <span class="badge badge-${data.status}">${data.status}</span> ${data.progress}% • 📋 ${numVisitas} monitoria(s)</p>
                `;
                list.appendChild(div);
            });
        }

                    <p><strong>GPS:</strong> ${data.latitude.toFixed(4)}, ${data.longitude.toFixed(4)}</p>
                    <p><strong>Status:</strong> <span class="badge badge-${data.status}">${data.status}</span></p>
                    <p><strong>Progresso:</strong> ${data.progress}%</p>
                </div>

                ${data.fotos && data.fotos.length > 0 ? `
                    <div style="margin-bottom: 12px;">
                        <h4 style="margin-bottom: 8px; font-size: 12px;">Fotos Iniciais</h4>
                        <div class="photo-grid">
                            ${data.fotos.map(f => `<div class="photo-item"><img src="${f.url}" alt="Foto" onclick="event.stopPropagation()"></div>`).join('')}
                        </div>
                    </div>
                ` : ''}

                ${visitsHTML}

                <div style="margin-top: 15px; display: flex; gap: 8px; flex-wrap: wrap;">
                    <button type="button" class="btn" style="background:#FAA842; flex: 1; padding: 10px; min-width: 120px;" onclick="openMonitoriaModal()">📊 Monitoria</button>
                    <button type="button" class="btn btn-danger" style="flex: 1; padding: 10px; min-width: 120px;" onclick="deleteRecord('${id}')">🗑️ Eliminar</button>
                </div>
            `;
            openModal('detailModal');
        }

        // DELETAR
        async function deleteRecord(id) {
            if (!confirm('Tem a certeza que deseja eliminar este registo?')) return;
            try {
                await db.collection('users').doc(currentUser.uid)
                    .collection('infraestruturas').doc(id).delete();
                showSuccess('✅ Registo eliminado!');
                closeModal('detailModal');
                loadRecords();
            } catch (error) {
                showError('Erro: ' + error.message);
            }
        }

        // VERIFICAR ADMINISTRADOR
        async function checkIfAdmin() {
            try {
                const userDoc = await db.collection('users').doc(currentUser.uid).get();

                // Verificar se a conta foi desativada por um Administrador
                if (userDoc.exists && userDoc.data().ativo === false) {
                    await auth.signOut();
                    showLoginScreen();
                    showError('🚫 A sua conta foi desativada. Contacte o Administrador.');
                    return;
                }

                // Nome: prioriza o guardado no Firestore (mais fiável que o Auth,
                // pois contas criadas manualmente no Firebase Console não têm displayName)
                const nomeExibicao = (userDoc.exists && userDoc.data().name) || currentUser.displayName || currentUser.email || 'Utilizador';

                if (userDoc.exists) {
                    isAdmin = userDoc.data().isAdmin || false;
                    document.getElementById('tabAdmin').style.display = isAdmin ? 'block' : 'none';
                }
                showAppScreen();
                document.getElementById('userInfo').textContent = `${nomeExibicao} ${isAdmin ? '(Administrador)' : ''}`;
                loadRecords();
            } catch (error) {
                showAppScreen();
                document.getElementById('userInfo').textContent = currentUser.displayName || currentUser.email || 'Utilizador';
                loadRecords();
            }
            updateOnlineStatus();
            updatePendingBadge();
        }

        // GPS
        function captureGPS() {
            const statusEl = document.getElementById('gpsStatus');
            const btn = document.getElementById('btnCaptureGPS');

            if (!navigator.geolocation) {
                statusEl.textContent = '❌ GPS não disponível neste dispositivo';
                statusEl.style.background = '#f8d7da';
                return;
            }

            statusEl.textContent = '🔄 A procurar sinal GPS... (funciona sem internet, pode demorar uns segundos ao ar livre)';
            statusEl.style.background = '#fff3cd';
            btn.disabled = true;
            btn.textContent = '🔄 A captar...';

            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    document.getElementById('latitude').value = pos.coords.latitude.toFixed(6);
                    document.getElementById('longitude').value = pos.coords.longitude.toFixed(6);
                    const precisao = pos.coords.accuracy ? ` (precisão: ±${Math.round(pos.coords.accuracy)}m)` : '';
                    statusEl.textContent = `✅ ${pos.coords.latitude.toFixed(5)}, ${pos.coords.longitude.toFixed(5)}${precisao}`;
                    statusEl.style.background = '#d4edda';
                    btn.disabled = false;
                    btn.textContent = '📍 Recaptar Coordenadas GPS';
                    showSuccess('✅ Coordenadas capturadas!');
                },
                (err) => {
                    const mensagens = {
                        1: '❌ Permissão de localização negada. Ative o GPS nas definições do telemóvel.',
                        2: '❌ Sem sinal de GPS. Tente novamente ao ar livre.',
                        3: '❌ Demorou demasiado tempo. Tente novamente.'
                    };
                    statusEl.textContent = mensagens[err.code] || ('❌ Erro: ' + err.message);
                    statusEl.style.background = '#f8d7da';
                    btn.disabled = false;
                    btn.textContent = '📍 Captar Coordenadas GPS';
                },
                {
                    enableHighAccuracy: true, // prioriza o chip GPS do telemóvel (funciona sem rede) em vez de localização por rede/wifi
                    timeout: 20000,
                    maximumAge: 0
                }
            );
        }

        // FOTOS
        function addPhotoPreview(event) {
            const files = event.target.files;
            Array.from(files).forEach(file => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    newPhotos.push({ name: file.name, data: e.target.result });
                    updatePhotoPreview();
                };
                reader.readAsDataURL(file);
            });
        }

        function updatePhotoPreview() {
            const preview = document.getElementById('photoPreview');
            preview.innerHTML = newPhotos.map((photo, idx) => `
                <div class="photo-item">
                    <img src="${photo.data}" alt="Preview">
                    <button type="button" class="photo-item-remove" onclick="newPhotos.splice(${idx}, 1); updatePhotoPreview();">✕</button>
                </div>
            `).join('');
        }

        function addMonitoriaPhotoPreview(event) {
            const files = event.target.files;
            Array.from(files).forEach(file => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    monitoriaPhotos.push({ name: file.name, data: e.target.result });
                    updateMonitoriaPhotoPreview();
                };
                reader.readAsDataURL(file);
            });
        }

        function updateMonitoriaPhotoPreview() {
            const preview = document.getElementById('monitoriaPhotoPreview');
            preview.innerHTML = monitoriaPhotos.map((photo, idx) => `
                <div class="photo-item">
                    <img src="${photo.data}" alt="Preview">
                    <button type="button" class="photo-item-remove" onclick="monitoriaPhotos.splice(${idx}, 1); updateMonitoriaPhotoPreview();">✕</button>
                </div>
            `).join('');
        }

        function openMonitoriaModal() {
            if (!selectedRecordId) return;
            monitoriaPhotos = [];
            document.getElementById('monitoriaPhotoPreview').innerHTML = '';
            document.getElementById('monitoriaForm').reset();
            // Pré-preencher status e progresso atuais do registo
            if (selectedRecordData) {
                document.getElementById('monitoriaStatus').value = selectedRecordData.status || 'planejado';
                document.getElementById('monitoriaProgress').value = selectedRecordData.progress || 0;
            }
            openModal('monitoriaModal');
        }

        // UI
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            event.target.classList.add('active');
            if (tab === 'lista') loadRecords();
            if (tab === 'admin') loadAdminData();
        }

        function openModal(id) {
            document.getElementById(id).classList.add('show');
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('show');
        }

        function showLoginScreen() {
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('appScreen').classList.remove('show');
        }

        function showAppScreen() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('appScreen').classList.add('show');
        }

        function toggleRegister() {
            document.getElementById('loginFormDiv').style.display = 
                document.getElementById('loginFormDiv').style.display === 'none' ? 'block' : 'none';
            document.getElementById('registerFormDiv').style.display = 
                document.getElementById('registerFormDiv').style.display === 'none' ? 'block' : 'none';
        }

        function logout() {
            adminUnsubscribes.forEach(unsub => unsub());
            adminUnsubscribes = [];
            auth.signOut();
        }

        function showError(msg) {
            const el = document.getElementById('error');
            el.textContent = msg;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 5000);
        }

        function showSuccess(msg) {
            const el = document.getElementById('success');
            el.textContent = msg;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 3000);
        }

        // PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }
    </script>
</body>
</html>
