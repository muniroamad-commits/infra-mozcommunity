<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="MozCommunity - App técnico para monitorização de infraestruturas">
    <meta name="theme-color" content="#185FA5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="MozCommunity">
    
    <title>MozCommunity v5.0 - App Técnico</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%23185FA5' width='192' height='192'/><text x='50%' y='50%' font-size='100' font-weight='bold' fill='white' text-anchor='middle' dominant-baseline='middle'>M</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%23185FA5' width='192' height='192'/><text x='50%' y='50%' font-size='100' font-weight='bold' fill='white' text-anchor='middle' dominant-baseline='middle'>M</text></svg>">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-storage-compat.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #185FA5;
            --secondary: #20B2AA;
            --success: #28A745;
            --warning: #FFC107;
            --danger: #DC3545;
            --dark: #1a1a1a;
            --light: #F8F9FA;
            --border: #E0E0E0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--light);
            color: var(--dark);
            line-height: 1.6;
            overflow-x: hidden;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: white;
        }

        .header {
            background: linear-gradient(135deg, var(--primary) 0%, #0C447C 100%);
            color: white;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 600;
        }

        .header-actions {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .btn-icon {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: all 0.3s;
        }

        .btn-icon:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.05);
        }

        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }

        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid var(--border);
        }

        .tab-btn {
            padding: 0.75rem 1rem;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: #999;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }

        .tab-btn.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            font-size: 14px;
            color: var(--dark);
        }

        input, select, textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(24, 95, 165, 0.1);
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            width: 100%;
            padding: 0.85rem;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-primary:hover {
            background: #0C447C;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(24, 95, 165, 0.2);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 8px;
            padding: 1.5rem;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .success-message {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
            padding: 1rem;
            border-radius: 4px;
            margin-bottom: 1rem;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        .error-message {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
            padding: 1rem;
            border-radius: 4px;
            margin-bottom: 1rem;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .login-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 1rem;
            background: linear-gradient(135deg, var(--primary) 0%, #0C447C 100%);
        }

        .login-box {
            background: white;
            border-radius: 8px;
            padding: 2rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .login-box h2 {
            text-align: center;
            margin-bottom: 1.5rem;
            color: var(--primary);
        }

        .login-box .form-group {
            margin-bottom: 1rem;
        }

        .empty-state {
            text-align: center;
            padding: 2rem 1rem;
            color: #999;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 16px;
            }
            .modal-content {
                width: 95%;
            }
        }
    </style>
</head>
<body>
    <div id="loginScreen" class="login-screen">
        <div class="login-box">
            <h2>
                <i class="fas fa-map-pin"></i>
                <br>MozCommunity v5.0
            </h2>
            
            <div id="loginError" class="error-message"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="loginEmail">Email</label>
                    <input type="email" id="loginEmail" required placeholder="seu@email.com">
                </div>

                <div class="form-group">
                    <label for="loginPassword">Palavra-passe</label>
                    <input type="password" id="loginPassword" required placeholder="••••••••">
                </div>

                <button type="submit" class="btn-primary" style="margin-bottom: 1rem;">
                    <i class="fas fa-sign-in-alt"></i> Entrar
                </button>
            </form>

            <p style="text-align: center; font-size: 14px; margin-bottom: 1rem;">
                Não tem conta?
            </p>

            <form id="registerForm">
                <div class="form-group">
                    <label for="registerName">Nome Completo</label>
                    <input type="text" id="registerName" placeholder="Seu nome">
                </div>

                <div class="form-group">
                    <label for="registerEmail">Email</label>
                    <input type="email" id="registerEmail" placeholder="seu@email.com">
                </div>

                <div class="form-group">
                    <label for="registerPassword">Palavra-passe</label>
                    <input type="password" id="registerPassword" placeholder="••••••••">
                </div>

                <button type="submit" class="btn-primary" style="background: var(--secondary);">
                    <i class="fas fa-user-plus"></i> Criar Conta
                </button>
            </form>

            <div style="text-align: center; margin-top: 1.5rem; font-size: 12px; color: #999;">
                Versão 5.0 • Acesso com Autenticação
            </div>
        </div>
    </div>

    <div id="appScreen" class="app-container" style="display: none;">
        <div class="header">
            <h1>
                <i class="fas fa-map-pin"></i> MozCommunity v5.0
            </h1>
            <div class="header-actions">
                <button class="btn-icon" title="Menu" onclick="openUserMenu()">
                    <i class="fas fa-user-circle"></i>
                </button>
            </div>
        </div>

        <div class="main-content">
            <div id="successMessage" class="success-message"></div>
            <div id="errorMessage" class="error-message"></div>

            <div class="tabs">
                <button class="tab-btn active" data-tab="novo" onclick="switchTab('novo')">
                    <i class="fas fa-plus-circle"></i> Novo Registo
                </button>
                <button class="tab-btn" data-tab="lista" onclick="switchTab('lista')">
                    <i class="fas fa-list"></i> Meus Registos
                </button>
            </div>

            <div id="tab-novo" class="tab-content active">
                <h2 style="margin-bottom: 1.5rem;">Novo Registo</h2>
                <form id="infraForm">
                    <div class="form-group">
                        <label for="nome">Nome *</label>
                        <input type="text" id="nome" required placeholder="Nome da infraestrutura">
                    </div>

                    <div class="form-group">
                        <label for="tipo">Tipo *</label>
                        <select id="tipo" required>
                            <option value="">Selecione...</option>
                            <option value="estrada">Estrada</option>
                            <option value="escola">Escola</option>
                            <option value="saude">Centro Saúde</option>
                            <option value="agua">Água</option>
                            <option value="outro">Outro</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="status">Status *</label>
                        <select id="status" required>
                            <option value="planejado">Planeado</option>
                            <option value="construcao">Em Construção</option>
                            <option value="concluido">Concluído</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="progress">Progresso (%) *</label>
                        <input type="number" id="progress" min="0" max="100" required value="0">
                    </div>

                    <button type="submit" class="btn-primary">
                        <i class="fas fa-save"></i> Guardar
                    </button>
                </form>
            </div>

            <div id="tab-lista" class="tab-content">
                <h2 style="margin-bottom: 1.5rem;">Meus Registos</h2>
                <div id="recordsList">
                    <div class="empty-state">Nenhum registo</div>
                </div>
            </div>
        </div>
    </div>

    <div id="userModal" class="modal">
        <div class="modal-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <h3>Menu</h3>
                <button onclick="closeUserModal()" style="background: none; border: none; font-size: 24px; cursor: pointer;">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div style="background: var(--light); padding: 1rem; border-radius: 6px; margin-bottom: 1rem;">
                <div style="font-weight: 600; margin-bottom: 0.25rem;" id="userNameDisplay"></div>
                <div style="font-size: 12px; color: #999;" id="userEmailDisplay"></div>
            </div>
            <button onclick="logout()" class="btn-primary" style="background: var(--danger);">
                <i class="fas fa-sign-out-alt"></i> Terminar Sessão
            </button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDqUPcchO02QsCdawYAhn5rSB_JjrMZV94",
            authDomain: "infra-mozcommunity.firebaseapp.com",
            projectId: "infra-mozcommunity",
            storageBucket: "infra-mozcommunity.firebasestorage.app",
            messagingSenderId: "296393259981",
            appId: "1:296393259981:web:d6cd641869cea1648662284"
        };

        let db, auth, currentUser = null;

        firebase.initializeApp(firebaseConfig);
        auth = firebase.auth();
        db = firebase.firestore();

        auth.onAuthStateChanged((user) => {
            if (user) {
                currentUser = user;
                showApp();
                updateUserDisplay();
                loadRecords();
            } else {
                showLogin();
            }
        });

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            auth.signInWithEmailAndPassword(email, password).catch(err => {
                showLoginError(err.message);
            });
        });

        document.getElementById('registerForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const name = document.getElementById('registerName').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            
            if (!name || !email || !password) {
                showLoginError('Preencha todos os campos');
                return;
            }

            auth.createUserWithEmailAndPassword(email, password)
                .then(result => {
                    result.user.updateProfile({ displayName: name });
                })
                .catch(err => {
                    showLoginError(err.message);
                });
        });

        function showApp() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('appScreen').style.display = 'flex';
        }

        function showLogin() {
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('appScreen').style.display = 'none';
        }

        function showLoginError(msg) {
            const err = document.getElementById('loginError');
            err.textContent = msg;
            err.classList.add('show');
            setTimeout(() => err.classList.remove('show'), 5000);
        }

        function updateUserDisplay() {
            if (currentUser) {
                document.getElementById('userNameDisplay').textContent = currentUser.displayName || 'Utilizador';
                document.getElementById('userEmailDisplay').textContent = currentUser.email;
            }
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
            document.getElementById(`tab-${tab}`).classList.add('active');
            if (tab === 'lista') loadRecords();
        }

        document.getElementById('infraForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const record = {
                nome: document.getElementById('nome').value,
                tipo: document.getElementById('tipo').value,
                status: document.getElementById('status').value,
                progress: parseInt(document.getElementById('progress').value),
                criado: new Date(),
                usuario: currentUser.uid
            };

            try {
                await db.collection('users').doc(currentUser.uid)
                    .collection('infraestruturas').add(record);
                showSuccess('✅ Registo guardado!');
                document.getElementById('infraForm').reset();
                switchTab('lista');
            } catch (error) {
                showError('Erro: ' + error.message);
            }
        });

        async function loadRecords() {
            try {
                const snapshot = await db.collection('users').doc(currentUser.uid)
                    .collection('infraestruturas').orderBy('criado', 'desc').get();

                const recordsList = document.getElementById('recordsList');
                recordsList.innerHTML = '';

                if (snapshot.empty) {
                    recordsList.innerHTML = '<div class="empty-state">Nenhum registo</div>';
                    return;
                }

                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const div = document.createElement('div');
                    div.style.cssText = 'background: white; border: 1px solid #e0e0e0; border-radius: 8px; padding: 1rem; margin-bottom: 1rem;';
                    div.innerHTML = `
                        <div style="font-weight: 600;">${data.nome}</div>
                        <div style="font-size: 12px; color: #999;">${data.tipo} • ${data.status}</div>
                        <div style="margin-top: 0.5rem; font-size: 12px;">Progresso: ${data.progress}%</div>
                    `;
                    recordsList.appendChild(div);
                });
            } catch (error) {
                showError('Erro ao carregar: ' + error.message);
            }
        }

        function openUserMenu() {
            document.getElementById('userModal').classList.add('active');
        }

        function closeUserModal() {
            document.getElementById('userModal').classList.remove('active');
        }

        function logout() {
            auth.signOut();
            closeUserModal();
        }

        function showSuccess(msg) {
            const el = document.getElementById('successMessage');
            el.textContent = msg;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 3000);
        }

        function showError(msg) {
            const el = document.getElementById('errorMessage');
            el.textContent = msg;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 5000);
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }
    </script>
</body>
</html>
